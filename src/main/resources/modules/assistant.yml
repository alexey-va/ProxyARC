# Chat assistant. Prompt: prompts/chat.txt | LLM: modules/llm.yml

chat:
  enabled: false
  max-history: 20
  display-name: "скорен"
  # Like CMI (%luckperms_suffix% &7{name} &8» &f{msg}), but with ◇ bot marker
  message-format: "<yellow>◇ <gray>%name% <dark_gray>» <white>%message%"
  relay-discord: true
  relay-telegram: true
