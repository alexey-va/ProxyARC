# Chat assistant. Prompt: prompts/chat.txt | LLM: modules/llm.yml
#
# In-game = CMI global ! chat:
#   Locale_RU shoutPrefix: &6Ⓖ &7
#   Chat.yml GeneralFormat: %luckperms_suffix% &7{name} &8» &f{msg}
# Bot suffix default: ItemsAdder lzranks:supporter_icon (Kotlin default if omitted)

chat:
  enabled: false
  max-history: 20
  compact-threshold: 18
  compact-keep-recent: 10
  observe-all-chat: true
  observe-max-lines: 40
  observe-format: "%player% » %message%"
  observe-context-header: "контекст чата (не все сообщения требуют ответа):"
  memory:
    enabled: true
    storage-key: arc.ai.assistant.facts
    min-confidence: 0.5
    max-injected: 20
  tools:
    - rememberfact
    - forgetfact
  display-name: "Скорен"
  shout-prefix: "&6Ⓖ &7"
  suffix: "&f"
  message-format: "%shout%%suffix% &7%name% &8» &f%message%"
  max-message-length: 70
  discord-inbound: true
  relay-discord: true
  relay-telegram: true
