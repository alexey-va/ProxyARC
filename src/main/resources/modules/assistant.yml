# Chat assistant. Prompt: prompts/chat.txt | LLM: modules/llm.yml
#
# In-game: CMI global ! chat (Locale_RU shoutPrefix + GeneralFormat).
# Players: &6Ⓖ &7 + gray name. Bot: same G, gold name (&e).

chat:
  enabled: false
  max-history: 20
  display-name: "скорен"
  shout-prefix: "&6Ⓖ &7"
  suffix: ""
  name-color: "&e"
  message-format: "%shout%%suffix%%name_color%%name% &8» &f%message%"
  max-message-length: 70
  relay-discord: true
  relay-telegram: true
